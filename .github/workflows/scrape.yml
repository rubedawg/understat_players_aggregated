name: Scrape Understat EPL

on:
  schedule:
    # Mon/Tue/Thu at 02:00 UTC
    # ≈ 2am UK during winter GMT, 3am UK during summer BST
    - cron: '0 2 * * 1,2,4'
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install understatapi pandas

      - name: Run scraper
        run: python scrape_epl.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add understat_epl_*.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPL data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
